name: CI Pipeline

on:
  push:
    branches:
      - main
      - refactoring

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.14.6"

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Create Virtual Environment
        run: uv venv

      - name: Install Dependencies
        run: |
          uv pip install -r requirements.txt
          uv pip install pytest ruff mypy

      - name: Lint and Format with Ruff
        run: |
          uv run ruff check .
          # uv run ruff format --check .

      - name: Type Check with MyPy
        run: uv run mypy src

      - name: Run Tests
        run: |
          pytest || echo "No tests configured yet"

  docker-build-and-push:
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo & Codebase
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: src/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omnipass-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/omnipass-backend:${{ github.sha }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omnipass-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/omnipass-frontend:${{ github.sha }}

  release:
    needs: docker-build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repo & Codebase
        uses: actions/checkout@v4

      - name: Create Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
