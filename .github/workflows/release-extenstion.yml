name: "Release OmniPass Extension"
on:
  workflow_dispatch:
  push:
    tags:
      - "v-ex-*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Zip Extension
        run: |
          cd frontend
          cd extenstion
          zip -r omnipass_extenstion-${{ github.ref_name }}.zip .

      - name: Create a Github Release
        uses: softprops/action-gh-release@v1
        with:
          name: Extension Release ${{ github.ref_name }}
          files: frontend/extenstion/omnipass_extenstion-${{ github.ref_name }}.zip
          generate_release_notes: true
