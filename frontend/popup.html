<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
        }

        .popup {
            padding: 20px;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #888;
            margin-bottom: 6px;
        }

        input[type="number"] {
            width: 100%;
            padding: 8px 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            font-size: 13px;
            border-radius: 3px;
            font-family: inherit;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #555;
        }

        .checkbox-group {
            display: flex;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: #666;
        }

        .output {
            margin: 16px 0;
        }

        .password-display {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 10px;
            border-radius: 3px;
            font-family: 'Monaco', monospace;
            font-size: 11px;
            word-break: break-all;
            line-height: 1.6;
            min-height: 50px;
            color: #999;
        }

        .buttons {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }

        .btn-gen {
            background: #222;
            color: #e0e0e0;
            border: 1px solid #444;
        }

        .btn-gen:hover {
            background: #333;
        }

        .btn-copy {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
        }

        .btn-copy:hover {
            background: #444;
        }

        .status {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 8px;
            min-height: 16px;
        }

        .status.ok {
            color: #6a9a6a;
        }
    </style>
</head>
<body>
    <div class="popup">
        <div class="title">\OmniPass</div>

        <div class="form-group">
            <label>Length</label>
            <input type="number" id="length" min="8" max="128" value="16">
        </div>

        <div class="form-group">
            <label>Options</label>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="arabic" checked>
                    <span>Arabic</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="numbers" checked>
                    <span>Numbers</span>
                </label>
            </div>
        </div>

        <div class="output">
            <div class="password-display" id="output">Generate</div>
        </div>

        <div class="buttons">
            <button class="btn-gen" id="generate">Generate</button>
            <button class="btn-copy" id="copy">Copy</button>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
