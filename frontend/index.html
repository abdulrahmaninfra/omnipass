<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OmniPass</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #0a0a0a;
                color: #e0e0e0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                font-size: 14px;
                line-height: 1.6;
            }

            .arabic-text {
                line-height: 1.8;
                font-family: "Cairo", sans-serif;
                text-rendering: optimizeLegibility;
            }

            .container {
                max-width: 500px;
                margin: 0 auto;
                padding: 40px 20px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .header {
                text-align: center;
                margin-bottom: 40px;
            }

            .title {
                font-size: 24px;
                font-weight: 600;
                margin-bottom: 4px;
                letter-spacing: -0.5px;
            }

            .tagline {
                font-size: 12px;
                color: #808080;
            }

            .generator {
                margin-bottom: 40px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            label {
                display: block;
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #999;
                margin-bottom: 8px;
            }

            input[type="number"] {
                width: 100%;
                padding: 10px 12px;
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                color: #e0e0e0;
                font-size: 14px;
                border-radius: 4px;
                font-family: inherit;
            }

            input[type="number"]:focus {
                outline: none;
                border-color: #666;
            }

            .checkbox-group {
                display: flex;
                gap: 20px;
            }

            .checkbox-item {
                display: flex;
                align-items: center;
                gap: 6px;
                cursor: pointer;
                font-size: 13px;
            }

            input[type="checkbox"] {
                width: 16px;
                height: 16px;
                cursor: pointer;
                accent-color: #666;
            }

            .button-group {
                display: flex;
                gap: 10px;
            }

            button {
                flex: 1;
                padding: 12px;
                border: none;
                border-radius: 4px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                transition: all 0.2s;
            }

            .btn-generate {
                background: #222;
                color: #e0e0e0;
                border: 1px solid #444;
            }

            .btn-generate:hover {
                background: #333;
                border-color: #555;
            }

            .btn-copy {
                background: #333;
                color: #e0e0e0;
                border: 1px solid #555;
            }

            .btn-copy:hover {
                background: #444;
            }

            .btn-copy.copied {
                background: #1a3a1a;
                border-color: #3a6a3a;
            }

            .output {
                margin-bottom: 20px;
            }

            .password-display {
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                padding: 16px;
                border-radius: 4px;
                font-family: "Monaco", "Menlo", monospace;
                font-size: 13px;
                word-break: break-all;
                line-height: 1.8;
                min-height: 60px;
                color: #b0b0b0;
            }

            .status {
                font-size: 12px;
                color: #666;
                text-align: center;
                min-height: 20px;
            }

            .status.success {
                color: #6a9a6a;
            }

            .footer {
                text-align: center;
                padding-top: 40px;
                border-top: 1px solid #1a1a1a;
            }

            .footer-text {
                font-size: 12px;
                color: #666;
                margin-bottom: 12px;
            }

            .social {
                display: flex;
                justify-content: center;
                gap: 16px;
            }

            a {
                color: #888;
                text-decoration: none;
                font-size: 12px;
                transition: color 0.2s;
            }

            a:hover {
                color: #b0b0b0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <div class="title">OmniPass</div>
                <div class="tagline">password generator</div>
            </div>

            <div class="generator">
                <div class="form-group">
                    <label>Length</label>
                    <input
                        type="number"
                        id="length"
                        min="8"
                        max="128"
                        value="16"
                    />
                </div>

                <div class="form-group">
                    <label>Options</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="arabic" checked />
                            <span>Arabic</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="numbers" checked />
                            <span>Numbers</span>
                        </label>
                    </div>
                </div>

                <div class="output">
                    <div class="password-display" id="output">
                        Generate a password
                    </div>
                </div>

                <div class="status" id="status"></div>

                <div class="button-group">
                    <button class="btn-generate" id="generate">Generate</button>
                    <button class="btn-copy" id="copy">Copy</button>
                </div>
            </div>

            <div class="footer">
                <div class="footer-text">
                    Built by github.com/abdulrahmaninfra | Frontend just a
                    AI-SLOP
                </div>
                <div class="social">
                    <a
                        href="https://github.com/abdulrahmaninfra"
                        target="_blank"
                        >GitHub</a
                    >
                    <a
                        href="https://github.com/abdulrahmaninfra/omnipass"
                        target="_blank"
                        >Repo</a
                    >
                </div>
            </div>
        </div>

        <script>
            const API_BASE = "https://omnipass-mu.vercel.app/generate";
            const output = document.getElementById("output");
            const status = document.getElementById("status");
            const generateBtn = document.getElementById("generate");
            const copyBtn = document.getElementById("copy");
            const lengthInput = document.getElementById("length");
            const arabicCheck = document.getElementById("arabic");
            const numbersCheck = document.getElementById("numbers");

            async function generate() {
                const len = lengthInput.value || 16;
                const ar = arabicCheck.checked;
                const nums = numbersCheck.checked;

                const params = new URLSearchParams({
                    length: len,
                    include_arabic: ar,
                    include_numbers: nums,
                });

                try {
                    const res = await fetch(`${API_BASE}?${params}`);
                    const data = await res.json();
                    output.textContent = data.password;
                    status.textContent = "";
                } catch (e) {
                    output.textContent = "Error generating password";
                    status.textContent = "Failed to reach API";
                    status.style.color = "#8a4a4a";
                }
            }

            function copy() {
                const pwd = output.textContent;
                if (
                    pwd &&
                    pwd !== "Generate a password" &&
                    pwd !== "Error generating password"
                ) {
                    navigator.clipboard.writeText(pwd).then(() => {
                        status.textContent = "Copied!";
                        status.classList.add("success");
                        copyBtn.classList.add("copied");
                        setTimeout(() => {
                            status.textContent = "";
                            status.classList.remove("success");
                            copyBtn.classList.remove("copied");
                        }, 2000);
                    });
                }
            }

            generateBtn.addEventListener("click", generate);
            copyBtn.addEventListener("click", copy);
            lengthInput.addEventListener(
                "keypress",
                (e) => e.key === "Enter" && generate(),
            );

            generate();
        </script>
    </body>
</html>
