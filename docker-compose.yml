services:
  backend:
    image: abdelrahmaninfra/omnipass:backend
    container_name: omnipass-backend
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    image: abdelrahmaninfra/omnipass:frontend
    container_name: omnipass-frontend
    build: ./frontend
    ports:
      - "80:80"
